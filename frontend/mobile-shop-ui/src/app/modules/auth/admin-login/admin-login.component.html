<div class="login-page">
  <div class="login-left">
    <div class="login-brand">
      <div class="brand-icon">⚙️</div>
      <h1>Admin Panel</h1>
      <p>Mobile Shop Management System</p>
    </div>
    <div class="login-features">
      <div class="feature-item">✅ Manage all shop tenants</div>
      <div class="feature-item">✅ Create & deactivate shops</div>
      <div class="feature-item">✅ Manage users & staff</div>
      <div class="feature-item">✅ View shop statistics</div>
    </div>
  </div>

  <div class="login-right">
    <div class="login-box">
      <div class="admin-badge">🔐 Admin Access Only</div>
      <div class="login-header">
        <h2>Admin Login</h2>
        <p>Sign in to the admin dashboard</p>
      </div>

      <div class="form-group">
        <label>Admin Email</label>
        <input type="email" [(ngModel)]="email"
          placeholder="admin@mobileshop.com"
          (keyup.enter)="login()">
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="pass-wrap">
          <input [type]="showPass ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="Admin password"
            (keyup.enter)="login()">
          <button class="pass-toggle" type="button"
            (click)="showPass = !showPass">
            {{ showPass ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <button class="login-btn" (click)="login()" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>

      <div class="login-footer">
        This panel is restricted to authorized administrators only.
      </div>
    </div>
  </div>
</div>
