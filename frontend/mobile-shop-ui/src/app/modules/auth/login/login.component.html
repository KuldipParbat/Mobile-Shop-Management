<div class="login-page">

  <div class="login-left">
    <div class="login-brand">
      <div class="brand-icon">📱</div>
      <h1>Mobile Shop</h1>
      <p>Complete shop management system</p>
    </div>
    <div class="login-features">
      <div class="feature-item">✅ Sales & Purchase tracking</div>
      <div class="feature-item">✅ IMEI barcode scanning</div>
      <div class="feature-item">✅ Inventory management</div>
      <div class="feature-item">✅ Profit & loss reports</div>
    </div>
  </div>

  <div class="login-right">
    <div class="login-box">

      <div class="login-header">
        <h2>Welcome back</h2>
        <p>Sign in to your shop dashboard</p>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="you@example.com"
          (keyup.enter)="login()"
          autocomplete="email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="pass-wrap">
          <input
            [type]="showPass ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="Enter your password"
            (keyup.enter)="login()"
            autocomplete="current-password">
          <button class="pass-toggle"
            (click)="showPass = !showPass" type="button">
            {{ showPass ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>
      <div style="text-align:right;margin-top:-10px;margin-bottom:18px">
  <a routerLink="/forgot-password"
    style="font-size:13px;color:#2563eb;text-decoration:none">
    Forgot password?
  </a>
</div>

      <button class="login-btn"
        (click)="login()"
        [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>

      <div class="login-footer">
        Contact your administrator to get access
      </div>

    </div>
  </div>

</div>
