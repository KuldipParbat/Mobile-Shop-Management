<nav class="navbar">

  <div class="navbar-left">
    <button class="toggle-btn" (click)="toggleSidebar.emit()">☰</button>
    <div class="shop-info">
      <span class="shop-name">{{ authService.shopName }}</span>
      <span class="shop-label">Management System</span>
    </div>
  </div>

  <div class="navbar-right">
    <div class="user-info">
      <div class="user-avatar">{{ authService.userName[0] }}</div>
      <div class="user-details">
        <span class="user-name">{{ authService.userName }}</span>
        <span class="user-role"
          [class.role-owner]="authService.isOwner()"
          [class.role-staff]="authService.isStaff()">
          {{ authService.userRole }}
        </span>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()">
      Logout
    </button>
  </div>

</nav>
